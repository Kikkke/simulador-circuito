<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Circuitos</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      padding: 30px 20px;
    }

    .contenedor-principal {
      max-width: 1200px;
      margin: 0 auto;
      background-color: #111111;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 32px;
      letter-spacing: 1px;
      color: #ffffff;
    }

    .secciones {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
      align-items: start;
    }

    .bloque {
      background-color: #151515;
      border: 1px solid #2f2f2f;
      border-radius: 16px;
      padding: 24px;
    }

    h2 {
      margin-bottom: 18px;
      font-size: 22px;
      color: #ffffff;
      border-bottom: 1px solid #2f2f2f;
      padding-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
    }

    th,
    td {
      border: 1px solid #2f2f2f;
      text-align: center;
      padding: 12px 10px;
    }

    th {
      background-color: #ffffff;
      color: #000000;
      font-size: 16px;
    }

    td {
      background-color: #101010;
      color: #f5f5f5;
    }

    input[type="text"] {
      width: 50px;
      height: 36px;
      text-align: center;
      border: 1px solid #555555;
      border-radius: 8px;
      background-color: #000000;
      color: #ffffff;
      font-size: 16px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #ffffff;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.12);
    }

    .panel-derecho {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .interruptores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .interruptor-item {
      background-color: #0d0d0d;
      border: 1px solid #2f2f2f;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 18px;
    }

    .interruptor-item label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      cursor: pointer;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #ffffff;
      cursor: pointer;
    }

    .salida-led {
      background-color: #0d0d0d;
      border: 1px solid #2f2f2f;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
    }

    .salida-led p {
      font-size: 22px;
      margin-bottom: 16px;
    }

    #led {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #ffffff;
      background-color: #000000;
      color: #ffffff;
      font-size: 28px;
      font-weight: bold;
    }

    @media (max-width: 900px) {
      .secciones {
        grid-template-columns: 1fr;
      }

      .interruptores {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor-principal">
    <h1>Simulador de Circuitos con Tabla de Verdad</h1>

  <div class="secciones">
      <div class="bloque">
        <h2>Tabla de verdad</h2>
        <table>
          <thead>
            <tr>
              <th>d</th>
              <th>c</th>
              <th>b</th>
              <th>a</th>
              <th>f</th>
            </tr>
          </thead>
          <tbody>
            <tr><td>0</td><td>0</td><td>0</td><td>0</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>0</td><td>0</td><td>0</td><td>1</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>0</td><td>0</td><td>1</td><td>0</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>0</td><td>0</td><td>1</td><td>1</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>0</td><td>1</td><td>0</td><td>0</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>0</td><td>1</td><td>0</td><td>1</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>0</td><td>1</td><td>1</td><td>0</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>0</td><td>1</td><td>1</td><td>1</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>1</td><td>0</td><td>0</td><td>0</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>1</td><td>0</td><td>0</td><td>1</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>1</td><td>0</td><td>1</td><td>0</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>1</td><td>0</td><td>1</td><td>1</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>1</td><td>1</td><td>0</td><td>0</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>1</td><td>1</td><td>0</td><td>1</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>1</td><td>1</td><td>1</td><td>0</td><td><input type="text" maxlength="1"></td></tr>
            <tr><td>1</td><td>1</td><td>1</td><td>1</td><td><input type="text" maxlength="1"></td></tr>
          </tbody>
        </table>
      </div>

      <div class="panel-derecho">
        <div class="bloque">
          <h2>Interruptores</h2>
          <div class="interruptores">
  <div class="interruptor-item">
              <label>
                <span>d</span>
                <input type="checkbox" id="switch-d">
              </label>
            </div>
  <div class="interruptor-item">
              <label>
                <span>c</span>
                <input type="checkbox" id="switch-c">
              </label>
            </div>
  <div class="interruptor-item">
              <label>
                <span>b</span>
                <input type="checkbox" id="switch-b">
              </label>
            </div>
  <div class="interruptor-item">
              <label>
                <span>a</span>
                <input type="checkbox" id="switch-a">
              </label>
            </div>

            </div>
        </div>

        <div class="bloque">
          <h2>Salida</h2>
          <div class="salida-led">
            <p>LED</p>
            <span id="led">0</span>
          </div>
        </div>
      </div>
    </div>

      <script src="circuito.js"></script>
  </div>
</body>
</html>
